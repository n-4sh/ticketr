<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <th:block th:replace="~{fragments/layout :: headBase('Mis Compras')}"></th:block>
    <style>
        .badge-ok {
            background-color: var(--ctp-mocha-green);
            color: var(--ctp-mocha-base);
            font-weight: 600;
        }

    </style>
</head>
<body>
    <nav th:replace="~{fragments/navbar :: user}"></nav>

    <div class="container">
        <h2 class="app-title">Mis Compras</h2>

        <div th:if="${#lists.isEmpty(compras)}" class="app-empty-state">
            Todavia no tienes compras registradas.
        </div>

        <div th:if="${!#lists.isEmpty(compras)}" class="app-table-wrap">
            <table class="table app-table">
                <thead>
                    <tr>
                        <th>Evento</th>
                        <th>Fecha de compra</th>
                        <th>Cantidad</th>
                        <th th:text="${'Total (' + @currencyHelper.primaryCode() + ')'}">Total</th>
                        <th th:text="${'Equivalente (' + @currencyHelper.secondaryCode() + ')'}">Equivalente</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="compra : ${compras}">
                        <td th:text="${compra.evento.nombre}"></td>
                        <td th:text="${#temporals.format(compra.fechaCompra, 'dd/MM/yyyy HH:mm')}"></td>
                        <td th:text="${compra.cantidad}"></td>
                        <td th:text="${@currencyHelper.primarySymbol() + ' ' + #numbers.formatDecimal(compra.total, 1, 2)}"></td>
                        <td th:text="${@currencyHelper.secondarySymbol() + ' ' + #numbers.formatDecimal(@currencyHelper.secondaryAmount(compra.total), 1, 2)}"></td>
                        <td><span class="badge badge-ok">Confirmada</span></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <th:block th:replace="~{fragments/layout :: scriptsBase}"></th:block>
</body>
</html>
