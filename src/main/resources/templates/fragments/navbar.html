<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
    <nav th:fragment="user" class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="#">Sistema de Boletos</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${activeKey == 'eventos'} ? ' active'" th:href="@{/eventos}">Eventos</a>
                    </li>
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <a class="nav-link" th:classappend="${activeKey == 'mis-compras'} ? ' active'" th:href="@{/mis-compras}">Mis Compras</a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link" th:classappend="${activeKey == 'admin-home'} ? ' active'" th:href="@{/admin}">Panel Admin</a>
                    </li>
                </ul>
                <div class="dropdown" th:if="${currentUser != null}">
                    <button class="btn btn-outline-light dropdown-toggle d-flex align-items-center app-profile-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                        <span class="d-inline-flex align-items-center justify-content-center rounded-circle border me-2 app-avatar-chip">
                            <svg xmlns="http://www.w3.org/2000/svg" class="app-avatar-icon-sm" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true">
                                <path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/>
                                <path d="M14 14s-1-4-6-4-6 4-6 4 1 1 6 1 6-1 6-1z"/>
                            </svg>
                        </span>
                        Perfil
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end dropdown-menu-dark app-profile-menu">
                        <li><h6 class="dropdown-header" th:text="${currentUser.nombre}">Usuario</h6></li>
                        <li><span class="dropdown-item-text" th:text="${currentUser.email}">correo@demo.com</span></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" th:href="@{/perfil}">Mi perfil</a></li>
                        <li>
                            <form th:action="@{/logout}" method="post" class="px-3 py-1">
                                <button class="btn btn-sm w-100 app-profile-logout" type="submit">Cerrar sesion</button>
                            </form>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <nav th:fragment="admin" class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" th:href="@{/admin}">Admin Panel</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${activeKey == 'eventos-publicos'} ? ' active'" th:href="@{/eventos}">Eventos Publicos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${activeKey == 'admin-home'} ? ' active'" th:href="@{/admin}">Panel Admin</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${activeKey == 'admin-eventos'} ? ' active'" th:href="@{/admin/eventos}">Eventos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${activeKey == 'admin-usuarios'} ? ' active'" th:href="@{/admin/usuarios}">Usuarios</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${activeKey == 'admin-compras'} ? ' active'" th:href="@{/admin/compras}">Compras</a>
                    </li>
                </ul>
                <div class="dropdown" th:if="${currentUser != null}">
                    <button class="btn btn-outline-light dropdown-toggle d-flex align-items-center app-profile-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                        <span class="d-inline-flex align-items-center justify-content-center rounded-circle border me-2 app-avatar-chip">
                            <svg xmlns="http://www.w3.org/2000/svg" class="app-avatar-icon-sm" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true">
                                <path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/>
                                <path d="M14 14s-1-4-6-4-6 4-6 4 1 1 6 1 6-1 6-1z"/>
                            </svg>
                        </span>
                        Perfil
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end dropdown-menu-dark app-profile-menu">
                        <li><h6 class="dropdown-header" th:text="${currentUser.nombre}">Usuario</h6></li>
                        <li><span class="dropdown-item-text" th:text="${currentUser.email}">correo@demo.com</span></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" th:href="@{/perfil}">Mi perfil</a></li>
                        <li>
                            <form th:action="@{/logout}" method="post" class="px-3 py-1">
                                <button class="btn btn-sm w-100 app-profile-logout" type="submit">Cerrar sesion</button>
                            </form>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>
</body>
</html>
