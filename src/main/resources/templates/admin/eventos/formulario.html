<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: headBase(${evento.id != null} ? 'Editar Evento' : 'Nuevo Evento')}"></th:block>
    <style>
        .form-container {
            background-color: var(--ctp-mocha-mantle);
            border: 1px solid var(--ctp-mocha-surface0);
            border-radius: 12px;
            padding: 2rem;
            margin-top: 1.5rem;
        }
        
        textarea.form-control {
            min-height: 120px;
        }
        
        .btn-secondary {
            background-color: var(--ctp-mocha-surface1);
            border: none;
            border-radius: 8px;
            padding: 0.75rem 1.5rem;
            font-weight: 500;
            transition: all 0.2s ease;
            color: var(--ctp-mocha-text);
        }
        
        .btn-secondary:hover {
            background-color: var(--ctp-mocha-surface2);
            transform: translateY(-2px);
        }
        
        @media (max-width: 768px) {
            .form-container {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <nav th:replace="~{fragments/navbar :: admin}"></nav>

    <div class="container">
        <h2 class="app-title" th:text="${evento.id != null} ? 'Editar Evento' : 'Nuevo Evento'"></h2>
        
        <div class="form-container">
            <form th:action="@{/admin/eventos/guardar}" th:object="${evento}" method="post">
                <input type="hidden" th:field="*{id}">
                <div class="mb-4">
                    <label for="nombre" class="form-label app-label">Nombre</label>
                    <input type="text" class="form-control app-input app-placeholder" id="nombre" th:field="*{nombre}" required placeholder="Nombre del evento">
                </div>
                <div class="mb-4">
                    <label for="descripcion" class="form-label app-label">Descripcion</label>
                    <textarea class="form-control app-textarea app-placeholder" id="descripcion" th:field="*{descripcion}" rows="4" required placeholder="Descripcion detallada del evento"></textarea>
                </div>
                <div class="mb-4">
                    <label for="lugar" class="form-label app-label">Lugar</label>
                    <input type="text" class="form-control app-input app-placeholder" id="lugar" th:field="*{lugar}" required placeholder="Ubicacion del evento">
                </div>
                <div class="mb-4">
                    <label for="fecha" class="form-label app-label">Fecha y Hora</label>
                    <input type="datetime-local" class="form-control app-input" id="fecha" th:field="*{fecha}" required>
                </div>
                <div class="mb-4">
                    <label for="capacidad" class="form-label app-label">Capacidad</label>
                    <input type="number" class="form-control app-input app-placeholder" id="capacidad" th:field="*{capacidad}" min="1" required placeholder="Numero maximo de asistentes">
                </div>
                <div class="mb-4">
                    <label for="precio" class="form-label app-label" th:text="${'Precio por boleto (' + @currencyHelper.primaryCode() + ')'}">Precio por boleto</label>
                    <input type="number" class="form-control app-input app-placeholder" id="precio" th:field="*{precio}" min="0" step="0.01" required th:placeholder="${'Precio en ' + @currencyHelper.primaryCode()}">
                    <small class="form-text" th:text="${'Tambien se mostrara equivalente en ' + @currencyHelper.secondaryCode()} "></small>
                </div>
                <div class="d-flex justify-content-end gap-3">
                    <a th:href="@{/admin/eventos}" class="btn btn-secondary">Cancelar</a>
                    <button type="submit" class="btn app-btn-primary">Guardar</button>
                </div>
            </form>
        </div>
    </div>
    <th:block th:replace="~{fragments/layout :: scriptsBase}"></th:block>
</body>
</html>
